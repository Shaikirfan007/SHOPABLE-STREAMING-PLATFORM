name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to project directory (create it if it doesn't exist)
            mkdir -p ~/shopy-stream-app
            cd ~/shopy-stream-app
            
            # Pull latest code from GitHub
            # Assuming you have cloned it once using: git clone https://github.com/USERNAME/REPO.git .
            git pull origin main || echo "Git pull failed. Ensure the repo is cloned."
            
            # Restart all Docker containers with the new code
            sudo docker-compose down
            sudo docker-compose up -d --build
            
            # Clean up dangling images to save disk space
            sudo docker image prune -f
