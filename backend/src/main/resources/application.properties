# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/shoppablestream
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/shoppablestream

# ML Service URL
ml.service.url=http://localhost:8000

# File Upload Limit
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Tomcat connection timeout (10 min) for long video processing
server.tomcat.connection-timeout=600000
spring.mvc.async.request-timeout=600000
