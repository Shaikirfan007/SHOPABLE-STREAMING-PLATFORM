version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shoppable_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shoppablestream
    ports:
      - "5433:5432"
    volumes:
      - shoppable_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: shoppable_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: shoppable_ml
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shoppable_backend
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shoppablestream
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/shoppablestream
      - SPRING_MONGODB_URI=mongodb://mongodb:27017/shoppablestream
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - postgres
      - mongodb
      - ml-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shoppable_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  shoppable_postgres_data:
  mongodb_data:
