version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shoppable_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shoppablestream
    ports:
      - "5433:5432"
    volumes:
      - shoppable_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: shoppable_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: shoppable_ml
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  shoppable_postgres_data:
  mongodb_data:
